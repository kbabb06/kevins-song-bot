<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Performer Queue</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 800px;
      margin: 40px auto;
      padding: 20px;
    }

    h1 {
      margin-bottom: 10px;
    }

    #queueCount {
      margin-bottom: 20px;
      color: #555;
    }

    .queue-item {
      border: 1px solid #ddd;
      border-radius: 10px;
      padding: 14px;
      margin-bottom: 12px;
      background: #f9f9f9;
    }

    .song-title {
      font-size: 20px;
      font-weight: bold;
      margin-bottom: 6px;
    }

    .meta {
      font-size: 14px;
      color: #666;
      margin-bottom: 10px;
    }

    .remove-btn {
      background: black;
      color: white;
      border: none;
      padding: 10px 12px;
      border-radius: 8px;
      cursor: pointer;
    }

    .empty {
      color: #666;
      padding: 20px 0;
    }

    #refreshBtn {
      margin-bottom: 20px;
      padding: 10px 12px;
      border: none;
      background: black;
      color: white;
      border-radius: 8px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <h1>Performer Queue</h1>
  <button id="refreshBtn">Refresh Queue</button>
  <div id="queueCount">Loading...</div>
  <div id="queueList"></div>

  <script>
    const queueCount = document.getElementById("queueCount");
    const queueList = document.getElementById("queueList");
    const refreshBtn = document.getElementById("refreshBtn");

    async function loadQueue() {
      try {
        const res = await fetch("http://localhost:3000/queue");
        const data = await res.json();

        queueCount.textContent = "Total requests: " + data.count;

        if (!data.requests.length) {
          queueList.innerHTML = '<div class="empty">No requests yet.</div>';
          return;
        }

        queueList.innerHTML = data.requests.map(item => {
          const when = new Date(item.submittedAt).toLocaleString();

          return `
            <div class="queue-item">
              <div class="song-title">${item.song}</div>
              <div class="meta">Original request: ${item.originalRequest || "N/A"}</div>
              <div class="meta">Submitted: ${when}</div>
              <button class="remove-btn" onclick="removeRequest(${item.id})">Mark Done</button>
            </div>
          `;
        }).join("");
      } catch (error) {
        queueCount.textContent = "Could not load queue.";
        queueList.innerHTML = "";
        console.error(error);
      }
    }

    async function removeRequest(id) {
      try {
        const res = await fetch("http://localhost:3000/queue/" + id, {
          method: "DELETE"
        });

        if (!res.ok) {
          throw new Error("Failed to remove request.");
        }

        loadQueue();
      } catch (error) {
        console.error(error);
      }
    }

    refreshBtn.onclick = loadQueue;
    window.removeRequest = removeRequest;

    loadQueue();
    setInterval(loadQueue, 5000);
  </script>
</body>
</html>
