<!DOCTYPE html>
<html>
<body style="background:transparent;color:#fff;font-family:sans-serif;">

<div style="max-width:600px;margin:auto;padding:10px;">

<input id="requester" placeholder="Your name" style="width:100%;padding:12px;margin-bottom:10px;" />
<input id="email" placeholder="Email (required)" style="width:100%;padding:12px;margin-bottom:10px;" />
<input id="phone" placeholder="Phone (optional)" style="width:100%;padding:12px;margin-bottom:10px;" />

<input id="search" placeholder="Search song..." style="width:100%;padding:14px;font-size:16px;" />

<div id="status" style="margin-top:10px;"></div>
<div id="results" style="margin-top:15px;"></div>

</div>

<script>
let debounce;

document.getElementById("search").addEventListener("input", function () {
  clearTimeout(debounce);
  debounce = setTimeout(searchSongs, 250);
});

async function searchSongs() {
  const q = document.getElementById("search").value;
  if (!q) return;

  const res = await fetch("/api/songs?q=" + encodeURIComponent(q));
  const data = await res.json();

  const container = document.getElementById("results");
  container.innerHTML = "";

  data.forEach(song => {
    const div = document.createElement("div");
    div.style.padding = "12px";
    div.style.border = "1px solid #333";
    div.style.marginBottom = "8px";
    div.style.cursor = "pointer";

    div.innerHTML = "<strong>" + song.song + "</strong><br><span style='color:#aaa'>" + song.artist + "</span>";

    div.onclick = async function () {
      const email = document.getElementById("email").value;

      if (!email || !email.includes("@")) {
        document.getElementById("status").innerText = "Valid email required";
        return;
      }

      await fetch("/api/queue", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({
          song: song.song,
          artist: song.artist,
          requester: document.getElementById("requester").value,
          email: email,
          phone: document.getElementById("phone").value
        })
      });

      document.getElementById("status").innerText = "Added: " + song.song;
    };

    container.appendChild(div);
  });
}
</script>

</body>
</html>
