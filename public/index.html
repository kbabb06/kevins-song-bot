<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
</head>

<body style="background:transparent;color:#fff;font-family:sans-serif;max-width:600px;margin:40px auto;">

<style>
input {
  width: 100%;
  padding: 14px;
  margin-bottom: 12px;
  border-radius: 12px;
  border: none;
  outline: none;
  background: rgba(0,0,0,0.5); /* darker */
  color: #fff;
  font-size: 16px; /* THIS fixes iPhone zoom */
}

input::placeholder {
  color: rgba(255,255,255,0.6);
}

button {
  width: 100%;
  padding: 14px;
  margin-top: 8px;
  border-radius: 12px;
  border: none;
  font-size: 16px;
  font-weight: 600;
  background: #4f8cff;
  color: white;
  cursor: pointer;
  transition: 0.2s;
}

button:hover {
  background: #3a6edc;
}

.card {
  padding: 14px;
  margin-bottom: 10px;
  background: rgba(255,255,255,0.08);
  border-radius: 12px;
  cursor: pointer;
  transition: 0.2s;
}

.card:hover {
  background: rgba(255,255,255,0.15);
}

.info {
  padding: 12px;
  margin-bottom: 12px;
  background: rgba(255,255,255,0.06);
  border-radius: 10px;
  font-size: 14px;
  color: #bbb;
}
</style>

<input id="requester" placeholder="Your name (required)" />
<input id="email" placeholder="Your email (required)" />
<input id="phone" placeholder="Your phone (optional)" />

<input id="search" placeholder="Type a song, artist, or vibe..." />
<button onclick="searchSongs()">Find Matching Songs</button>

<div id="results" style="margin-top:20px;"></div>

<script>
async function searchSongs() {
  const q = document.getElementById("search").value.trim();
  const container = document.getElementById("results");

  if (!q) {
    container.innerHTML = "<p>Please type something first.</p>";
    return;
  }

  container.innerHTML = "<p>Finding matches...</p>";

  try {
    const res = await fetch("/api/song-bot", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ request: q })
    });

    const data = await res.json();
    container.innerHTML = "";

    const instruction = document.createElement("div");
    instruction.className = "info";
    instruction.innerText = "Tap a song below to submit your request";
    container.appendChild(instruction);

    if (!data.suggestions || !data.suggestions.length) {
      const empty = document.createElement("div");
      empty.className = "info";
      empty.innerText = "No strong matches found.";
      container.appendChild(empty);
      return;
    }

    data.suggestions.forEach(function (song) {
      const div = document.createElement("div");
      div.className = "card";
      div.innerText = song.song + " - " + song.artist;

      div.onclick = async function () {
        const requester = document.getElementById("requester").value.trim();
        const email = document.getElementById("email").value.trim();
        const phone = document.getElementById("phone").value.trim();

        if (!requester) {
          alert("Please enter your name.");
          document.getElementById("requester").focus();
          return;
        }

        if (!email) {
          alert("Please enter your email.");
          document.getElementById("email").focus();
          return;
        }

        div.innerText = "Submitting...";
        div.style.opacity = "0.6";

        const queueRes = await fetch("/api/queue", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            song: song.song,
            artist: song.artist,
            requester,
            email,
            phone
          })
        });

        const queueData = await queueRes.json();

        if (!queueRes.ok) {
          alert(queueData.error || "Could not submit request");
          div.style.opacity = "1";
          div.innerText = song.song + " - " + song.artist;
          return;
        }

        div.innerText = "✅ Submitted: " + song.song;
        div.style.background = "#0a3";
      };

      container.appendChild(div);
    });

  } catch (err) {
    console.error(err);
    container.innerHTML = "<p>Error finding matches.</p>";
  }
}
</script>

</body>
</html>
