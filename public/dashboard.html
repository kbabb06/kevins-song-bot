<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Performer Dashboard</title>
</head>
<body style="background:#0b0b0b;color:#fff;font-family:sans-serif;max-width:1000px;margin:30px auto;padding:20px;">

<h1>Performer Dashboard</h1>
<p style="color:#aaa;">Live song requests</p>

<div style="margin-bottom:20px;">
  <button onclick="loadQueue()" style="padding:10px 14px;margin-right:10px;cursor:pointer;">Refresh</button>
  <button onclick="clearQueue()" style="padding:10px 14px;cursor:pointer;">Clear All</button>
</div>

<div id="queue"></div>

<script>
const API_BASE = "https://kevins-song-bot.onrender.com";

async function loadQueue() {
  const res = await fetch(API_BASE + "/api/queue");
  const data = await res.json();

  const container = document.getElementById("queue");
  container.innerHTML = "";

  if (!Array.isArray(data) || data.length === 0) {
    container.innerHTML = "<div style='color:#aaa;'>No requests yet.</div>";
    return;
  }

  const sorted = data.slice().sort(function (a, b) {
    return new Date(b.time) - new Date(a.time);
  });

  for (let i = 0; i < sorted.length; i++) {
    const item = sorted[i];

    const div = document.createElement("div");
    div.style.border = "1px solid #333";
    div.style.padding = "14px";
    div.style.marginBottom = "12px";
    div.style.borderRadius = "8px";
    div.style.background = item.status === "played" ? "#1c2b1c" : "#151515";

    const requester = item.requester ? item.requester : "-";
    const email = item.email ? item.email : "-";
    const phone = item.phone ? item.phone : "-";
    const time = new Date(item.time).toLocaleString();

    div.innerHTML =
      "<div style='font-size:20px;font-weight:bold;'>" + item.song + "</div>" +
      "<div style='color:#bbb;margin-top:4px;'>" + item.artist + "</div>" +
      "<div style='margin-top:8px;'>Name: " + requester + "</div>" +
      "<div style='margin-top:4px;'>Email: " + email + "</div>" +
      "<div style='margin-top:4px;'>Phone: " + phone + "</div>" +
      "<div style='margin-top:4px;color:#999;'>Time: " + time + "</div>" +
      "<div style='margin-top:6px;'>Status: " + item.status + "</div>";

    const controls = document.createElement("div");
    controls.style.marginTop = "12px";

    const playedBtn = document.createElement("button");
    playedBtn.innerText = item.status === "played" ? "Played" : "Mark Played";
    playedBtn.style.padding = "8px 12px";
    playedBtn.style.marginRight = "8px";
    playedBtn.style.cursor = "pointer";
    playedBtn.disabled = item.status === "played";
    playedBtn.onclick = async function () {
      await fetch(API_BASE + "/api/queue/" + item.id, {
        method: "PATCH",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ status: "played" })
      });
      loadQueue();
    };

    const deleteBtn = document.createElement("button");
    deleteBtn.innerText = "Delete";
    deleteBtn.style.padding = "8px 12px";
    deleteBtn.style.cursor = "pointer";
    deleteBtn.onclick = async function () {
      await fetch(API_BASE + "/api/queue/" + item.id, {
        method: "DELETE"
      });
      loadQueue();
    };

    controls.appendChild(playedBtn);
    controls.appendChild(deleteBtn);
    div.appendChild(controls);

    container.appendChild(div);
  }
}

async function clearQueue() {
  await fetch(API_BASE + "/api/queue", {
    method: "DELETE"
  });
  loadQueue();
}

loadQueue();
setInterval(loadQueue, 3000);
</script>

</body>
</html>
